services:
  postgres:
    image: postgres:16-alpine
    container_name: oancestral-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: oancestral
      POSTGRES_PASSWORD: oancestral_dev_2024
      POSTGRES_DB: oancestral
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oancestral"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oancestral-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oancestral-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      # Override DATABASE_URL to use Docker internal network
      DATABASE_URL: postgresql://oancestral:oancestral_dev_2024@postgres:5432/oancestral
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Isolate node_modules inside the container (avoids Windows/WSL2 conflicts)
      - node_modules:/app/node_modules
      # Persist .next build cache
      - next_cache:/app/.next
    networks:
      - oancestral-net

networks:
  oancestral-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  node_modules:
    driver: local
  next_cache:
    driver: local
